concepts:
  labor_disruption:
    id: labor_disruption
    description: Workers, unions, strikes, wage disputes, or labor actions affecting operations.
    score: 3
    terms:
      - strike
      - strikes
      - walkout
      - walk off
      - walked off
      - workers walked off
      - work stoppage
      - labor unrest
      - labour unrest
      - industrial action
      - union dispute
      - wage dispute
      - failed wage talks
      - wage negotiations
      - collective bargaining
      - workers protest
      - miners protest
      - unionized workers
      - labor conflict
      - labour conflict

  mining_disruption:
    id: mining_disruption
    description: Mining operations disrupted by shutdowns, accidents, weather, protests, or operational problems.
    score: 3
    terms:
