version: 2

project:
  name: capital_relevant_watchlist_engine
  description: >
    Monitors selected entities across public APIs and normalizes matching records
    into evidence hits.

settings:
  max_results_per_query: 25
  require_entity_match: true
  min_relevance_score: 4
  high_relevance_score: 8
  medium_relevance_score: 4

  # Global source behavior. Entity-specific source_filters can override this.
  source_filters:
    gdelt:
      enabled: true
      require_entity_match: true
      require_concept_match: true
      use_concept_cameo_codes: true
    openalex:
      enabled: true
      require_entity_match: true
      require_concept_match: false
    wikidata:
      enabled: true
      require_entity_match: true
    sec:
      enabled: false
      require_entity_match: true

sources:
  openalex:
    enabled: true
    purpose: research_trend_monitoring

  gdelt:
    enabled: true
    purpose: news_and_event_monitoring

  wikidata:
    enabled: true
    purpose: entity_resolution_and_alias_expansion

  sec:
    enabled: false
    purpose: public_company_filing_monitoring

