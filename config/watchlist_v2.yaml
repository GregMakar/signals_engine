scoring:
  entity_match:
    exact_name: 3
    manual_alias: 3
    wikidata_alias: 2
    related_entity: 1

  concept_match:
    use_concept_score: true

  gdelt:
    concept_cameo_match: 2
    severe_cameo_match: 3
    apply_concept_severity_weight: true
    severe_cameo_codes:
      - "143"   # Strike or boycott
      - "144"   # Physical obstruction
      - "145"   # Violent protest / riot
      - "166"   # Embargo / boycott
      - "171"   # Seize or damage property
      - "1711"  # Confiscate property
      - "1712"  # Destroy property
      - "172"   # Administrative sanctions
      - "190"   # Use conventional force
      - "191"   # Blockade / restrict movement

  source_weight:
    gdelt: 1
    openalex: 1
    wikidata: 0
    sec: 2

  recency:
    within_1_days: 4
    within_3_days: 3
    within_7_days: 2
    within_14_days: 1
    older_than_14_days: 0

  penalties:
    negative_term_match: -3
    missing_date: -1
    missing_url: -1
    weak_entity_match: -2
    cameo_without_concept_match: -2
    concept_without_entity_match: -3

  labels:
    high:
      min_score: 8
    medium:
      min_score: 4
    low:
      min_score: 0

