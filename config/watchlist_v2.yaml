scoring:
  version: 1

  # -------------------------
  # Relevance: how connected is this hit to the watchlist?
  # -------------------------
  relevance:
    hit_scope:
      direct: 3.0
      related: 1.5
      context: 0.75
      unknown: 0.1

    entity_match:
      entity_alias: 3.0
      wikidata_alias: 2.0
      related_entity: 1.0
      country_code: 1.0
      geo_match: 1.0
      cameo_code: 1.0
      concept_keyword: 0.5
      url_keyword: 0.5
      source_name: 0.2

    entity_priority:
      high: 1.5
      medium: 0.75
      low: 0.0

    context_keys:
      commodity_match: 1.0
      sector_match: 0.75
      geography_match: 0.75
      risk_theme_match: 1.0

  # -------------------------
  # Severity: how serious is the event/type of evidence?
  # -------------------------
  severity:
    concept_match:
      use_concept_score: true


    concept_weights:
      default_weight: 1.0
      labor_disruption: 2.5
      mining_disruption: 2.25
      supply_disruption: 2.5
      sanctions: 3.0
      regulatory_risk: 2.0
      armed_conflict: 3.5
      infrastructure_damage: 3.0
      export_restriction: 3.0
      operational_shutdown: 3.25
      research: 1.0

    gdelt:
      apply_concept_severity_weight: true

      cameo_exact_weights:
        "143": 3.0    # Conduct strike or boycott
        "144": 2.5    # Obstruct physically
        "145": 3.0    # Violent protest / riot
        "166": 3.0    # Expel / embargo / boycott-like coercion
        "171": 3.0    # Seize or damage property
        "1711": 3.25   # Confiscate property
        "1712": 3.5    # Destroy property
        "172": 2.5    # Administrative sanctions
        "173": 3.0    # Arrest / detain
        "180": 3.25   # Use unconventional violence
        "182": 3.5    # Physically assault
        "183": 3.75   # Conduct suicide/bombing/terror-type action
        "190": 3.5    # Use conventional military force
        "191": 3.25   # Blockade / restrict movement
        "193": 3.75   # Fight with small arms/light weapons
        "194": 4.0    # Fight with artillery/tanks/heavy weapons
        "195": 4.0    # Employ aerial weapons
        "200": 4.5    # Use mass violence

      cameo_root_weights:
        "10": 1.0     # Demand
        "11": 1.0     # Disapprove
        "12": 1.0     # Reject
        "13": 1.5     # Threaten
        "14": 2.0     # Protest
        "15": 2.0     # Exhibit force posture
        "16": 2.0     # Reduce relations
        "17": 2.75    # Coerce
        "18": 3.25    # Assault
        "19": 3.5     # Fight
        "20": 4.5     # Mass violence

      severe_cameo_codes:
        - "143"
        - "144"
        - "145"
        - "166"
        - "171"
        - "1711"
        - "1712"
        - "172"
        - "173"
        - "180"
        - "182"
        - "183"
        - "190"
        - "191"
        - "193"
        - "194"
        - "195"
        - "200"

      severe_cameo_bonus: 1.0
      cameo_without_concept_penalty: -2.0

  # -------------------------
  # Confidence: how much should we trust the hit?
  # -------------------------
  confidence:
    source_weight:
      gdelt: 1.0
      openalex: 1.0
      wikidata: 0.25
      sec: 2.0

    gdelt:
      num_sources:
        medium_threshold: 3
        high_threshold: 5
        medium_weight: 0.5
        high_weight: 1.0

      num_mentions:
        medium_threshold: 5
        high_threshold: 15
        medium_weight: 0.5
        high_weight: 1.0

      num_articles:
        medium_threshold: 3
        high_threshold: 10
        medium_weight: 0.5
        high_weight: 1.0

      mention_confidence:
        medium_threshold: 40
        high_threshold: 70
        medium_weight: 0.5
        high_weight: 1.0

      has_url_weight: 0.5

    source_quality:
      known_reliable_source: 1.0
      unknown_source: 0.0
      low_quality_source: -1.0

  # -------------------------
  # Recency: how fresh is the evidence?
  # -------------------------
  recency:
    within_1_days: 2.0
    within_3_days: 1.5
    within_7_days: 1.0
    within_14_days: 0.5
    older_than_14_days: 0.0
    missing_date: -1.5

  # -------------------------
  # Novelty: V1 can mostly ignore this
  # -------------------------
  novelty:
    enabled: false
    first_seen_bonus: 1.0
    duplicate_penalty: -1.0
    repeated_same_event_penalty: -0.5

  # -------------------------
  # Penalties
  # -------------------------
  penalties:
    negative_term_match: -3.0
    missing_url: -1.0
    url_404: -2.0
    missing_date: -1.5
    weak_entity_match: -2.0
    concept_without_entity_match: -2.5
    context_only_low_confidence: -1.0
    translation_noise: -1.0
    ambiguous_keyword_match: -1.5

  # -------------------------
  # Labels for human-readable score output
  # -------------------------
  labels:
    critical:
      min_score: 10.0
    high:
      min_score: 7.0
    medium:
      min_score: 4.0
    low:
      min_score: 0.0

  # -------------------------
  # Routing decision: what the system should do next
  # -------------------------
  routing:
    ignore_below: 2.0
    store_only_below: 5.0
    manual_review_below: 8.0
    alert_at_or_above: 8.0


